<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>QuickTap</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="background"></div>
  <div class="bg-text">JIN</div>

  <div id="loginScreen" class="centered">
    <h1>QuickTap</h1>
    <input type="text" id="username" placeholder="Enter your name" />
    <button id="startBtn">GO!</button>
  </div>

  <div id="gameScreen" class="centered hidden">
    <div id="adminUI" class="hidden">
      <button id="seikaiBtn">正解</button>
      <button id="booBtn">残念</button>
    </div>
    <div id="playerUI" class="hidden">
      <button id="answerBtn">CRICK</button>
    </div>

    <div class="volume-control">
      🔊 <input type="range" id="volumeSlider" min="0" max="100" value="50" />
      <span id="volumeLabel">50%</span>
    </div>

    <div id="answerList" class="answer-list"></div>
  </div>

  <audio id="boo" src="assets/boo.mp3"></audio>
  <audio id="seikai" src="assets/seikai.mp3"></audio>
  <audio id="button" src="assets/button.mp3"></audio>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="socket.js" type="module"></script>
  <script src="main.js" type="module"></script>
</body>
</html>
