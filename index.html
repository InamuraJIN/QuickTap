<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>QuickTap</title>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <link rel="stylesheet" href="css/session.css">
  <meta property="og:title" content="QuickTap">
  <meta property="og:description" content="ブラウザだけで遊べるクイズボタンウェブアプリ">
</head>
<body>
<div id="main">
  <!-- ログイン画面 -->
  <div id="loginScreenWrap" class="loginScreen__wrap">
    <div class="loginScreen">
      <div class="loginScreen__title">
        <label for="playerName">ニックネームを入力してください</label>
      </div>
      <div class="loginScreen__input">
        <input id="playerName">
      </div>
      <div class="loginScreen__JoinButton">
        <button id="join">参加する</button>
      </div>
    </div>
  </div>

  <!-- ゲーム画面 -->
  <div id="playGame" style="display: none;">
    <!-- 管理者UI -->
    <div id="adminUI" style="display: none;">
      <div class="btnArea btnArea--admin">
        <button id="correct" class="btn-square-pop btn-square-pop--pinpon">正解</button>
        <button id="wrong" class="btn-square-pop btn-square-pop--boboo">残念</button>
      </div>
    </div>

    <!-- プレイヤーUI -->
    <div id="playerUI" style="display: none;">
      <div class="btnArea">
        <a href="#" id="push" class="btn-circle-3d btn-circle-3d--shadow pushable">CRICK!</a>
      </div>
    </div>

    <!-- 共通UI -->
    <div class="controllers">
      <div class="controllers__item">
        <button id="volume_button" class="controllers__button controllers__button--shadow">
          🔊
        </button>
      </div>
      <div class="volume-control" style="display: none;">
        <input type="range" id="volumeSlider" min="0" max="100" value="50" />
        <span id="volumeLabel">50%</span>
      </div>
    </div>

    <div id="displayPushedPlayers" class="displayPushedPlayers"></div>
  </div>
</div>

<!-- 音声 -->
<audio id="boboo" src="assets/boo.mp3"></audio>
<audio id="pinpon" src="assets/seikai.mp3"></audio>
<audio id="buzzer" src="assets/button.mp3"></audio>

<!-- Socket.io -->
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<!-- アプリケーションスクリプト -->
<script src="js/audio-controller.js"></script>
<script src="js/ui-controller.js"></script>
<script src="js/socket-handler.js"></script>
<script src="js/main.js"></script>
</body>
</html>
