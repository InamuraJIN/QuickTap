<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>QuickTap</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    body {
      font-family: sans-serif;
      background: #222;
      color: white;
      text-align: center;
      padding-top: 50px;
    }

    .hidden { display: none }

    input, button {
      font-size: 1.2rem;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      margin: 10px;
    }

    input {
      width: 250px;
      text-align: center;
    }

    button {
      background: #555;
      color: white;
      cursor: pointer;
    }

    #answerBtn {
      font-size: 2rem;
      padding: 40px;
      background: #666;
    }

    #list {
      margin-top: 40px;
      font-size: 1.5rem;
    }
  </style>
</head>
<body>
  <div id="login">
    <h1>QuickTap</h1>
    <input type="text" id="username" placeholder="Enter your name">
    <button id="joinBtn">GO!</button>
  </div>

  <div id="game" class="hidden">
    <div id="adminUI" class="hidden">
      <button onclick="sendSound('seikai')">正解</button>
      <button onclick="sendSound('boo')">残念</button>
    </div>

    <div id="playerUI" class="hidden">
      <button id="answerBtn">押</button>
    </div>

    <div id="list"></div>
  </div>

  <audio id="button" src="assets/button.mp3"></audio>
  <audio id="seikai" src="assets/seikai.mp3"></audio>
  <audio id="boo" src="assets/boo.mp3"></audio>

  <script>
    const socket = io()
    const login = document.getElementById("login")
    const game = document.getElementById("game")
    const usernameInput = document.getElementById("username")
    const joinBtn = document.getElementById("joinBtn")
    const list = document.getElementById("list")
    const answerBtn = document.getElementById("answerBtn")
    const adminUI = document.getElementById("adminUI")
    const playerUI = document.getElementById("playerUI")

    joinBtn.onclick = () => {
      const name = usernameInput.value.trim()
      if (!name) return
      localStorage.setItem("username", name)

      socket.emit("username", name)

      login.classList.add("hidden")
      game.classList.remove("hidden")
      if (name === "Ad") {
        adminUI.classList.remove("hidden")
      } else {
        playerUI.classList.remove("hidden")
      }
    }

    answerBtn.onclick = () => {
      socket.emit("answer")
    }

    function sendSound(type) {
      socket.emit("sound", type)
    }

    socket.on("play", (soundId) => {
      const audio = document.getElementById(soundId)
      if (audio) {
        audio.currentTime = 0
        audio.play()
      }
    })

    socket.on("updateList", (names) => {
      list.innerHTML = names.map((n, i) => `${i + 1}. ${n}`).join("<br>")
    })

    // 自動ログイン
    const saved = localStorage.getItem("username")
    if (saved) {
      usernameInput.value = saved
    }
  </script>
</body>
</html>
