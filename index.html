<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>QuickTap</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    @font-face {
      font-family: "Geist";
      src: url("https://assets.codepen.io/605876/GeistVF.ttf") format("truetype");
    }

    * {
      box-sizing: border-box;
      padding: 0;
      margin: 0;
    }

    :root {
      --size: 20px;
    }

    body {
      font-family: "Geist", sans-serif;
      min-height: 100vh;
      background: hsl(0 0% 6%);
      overflow: hidden;
    }

    .background {
      position: fixed;
      inset: 0;
      background: conic-gradient(from 180deg at 50% 70%, hsla(0,0%,98%,1) 0deg, #eec32d 72deg, #ec4b4b 144deg, #709ab9 216deg, #4dffbf 288deg, hsla(0,0%,98%,1) 1turn);
      mask:
        radial-gradient(circle at 50% 50%, white 2px, transparent 2.5px) 50% 50% / var(--size) var(--size),
        url("https://assets.codepen.io/605876/noise-mask.png") 256px 50% / 256px 256px;
      mask-composite: intersect;
      animation: flicker 20s infinite linear;
      z-index: -1;
    }

    @keyframes flicker {
      to {
        mask-position: 50% 50%, 0 50%;
      }
    }

    .centered {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: white;
      gap: 20px;
    }

    .hidden {
      display: none !important;
    }

    button {
      font-size: 1.2rem;
      padding: 10px 20px;
      background: #ff8181;
      border: none;
      border-radius: 5px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    input {
      font-size: 1.2rem;
      padding: 10px;
      border-radius: 5px;
      border: none;
      width: 250px;
      text-align: center;
    }

    .admin-controls,
    .player-controls {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .volume-control {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 30px;
    }

    input[type="range"] {
      width: 200px;
    }
  </style>
</head>
<body>
  <div class="background"></div>

  <!-- ユーザー名入力 -->
  <div id="loginScreen" class="centered">
    <h1>QuickTap</h1>
    <input type="text" id="username" placeholder="Enter your name" />
    <button id="startBtn">GO</button>
  </div>

  <!-- ゲーム画面 -->
  <div id="gameScreen" class="centered hidden">
    <div id="adminUI" class="admin-controls hidden">
      <button onclick="playSound('seikai')">正解</button>
      <button onclick="playSound('buu')">残念</button>
    </div>
    <div id="playerUI" class="player-controls hidden">
      <button onclick="handleAnswer()">回答</button>
    </div>
    <div class="volume-control">
      🔊 <input type="range" id="volumeSlider" min="0" max="100" value="50" />
      <span id="volumeLabel">50%</span>
    </div>
  </div>

  <!-- 音声 -->
  <audio id="buu" src="assets/buu.mp3"></audio>
  <audio id="seikai" src="assets/seikai.mp3"></audio>
  <audio id="button" src="assets/button.mp3"></audio>

  <script>
    const login = document.getElementById("loginScreen")
    const game = document.getElementById("gameScreen")
    const admin = document.getElementById("adminUI")
    const player = document.getElementById("playerUI")

    const usernameInput = document.getElementById("username")
    const startBtn = document.getElementById("startBtn")

    const slider = document.getElementById("volumeSlider")
    const label = document.getElementById("volumeLabel")
    const audios = document.querySelectorAll("audio")

    const savedName = localStorage.getItem("username")
    if (savedName) usernameInput.value = savedName

    startBtn.addEventListener("click", () => {
      const name = usernameInput.value.trim()
      if (!name) return
      localStorage.setItem("username", name)

      login.classList.add("hidden")
      game.classList.remove("hidden")

      if (name === "Ad") {
        admin.classList.remove("hidden")
      } else {
        player.classList.remove("hidden")
      }
    })

    slider.addEventListener("input", () => {
      const v = slider.value
      label.textContent = `${v}%`
      localStorage.setItem("volume", v)
      audios.forEach(a => a.volume = v / 100)
    })

    const savedVol = localStorage.getItem("volume") || "50"
    slider.value = savedVol
    label.textContent = `${savedVol}%`
    audios.forEach(a => a.volume = savedVol / 100)

    function playSound(id) {
      const el = document.getElementById(id)
      el.currentTime = 0
      el.play()
    }

    function handleAnswer() {
      playSound("button")
    }
  </script>
</body>
</html>
