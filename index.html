<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>QuickTap</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="background"></div>
  <div class="bg-text">JIN</div>

  <div id="loginScreen" class="centered">
    <h1>QuickTap</h1>
    <div style="display: flex; flex-direction: column; align-items: center; gap: 10px;">
      <p id="nameNote">名前をアルファベットで記入してください</p>
      <input type="text" id="username" placeholder="Enter your name" />
    </div>
    <button id="startBtn">GO!</button>
  </div>

  <div id="gameScreen" class="centered hidden">
    <div id="adminUI" class="hidden" style="top: 45%;">
      <div style="display: flex; gap: 20px;">
        <button id="seikaiBtn">正解</button>
        <button id="booBtn">残念</button>
        <button id="resetBtn">リセット</button>
      </div>
      <div style="display: flex; align-items: center; gap: 20px;">
        <button id="maruBtn">〇</button>
        <button id="batsuBtn">×</button>
        <label style="display: flex; flex-direction: column; align-items: center; font-size: 0.9rem;">
          公開
          <input type="checkbox" id="rankingToggle" />
        </label>
        <button id="rankingBtn" style="min-width: 100px;">ランキング</button>
      </div>
    </div>

    <div id="playerUI" class="hidden">
      <button id="answerBtn">Tap!</button>
      <div>
        <button id="selectMaru">〇</button>
        <button id="selectBatsu">×</button>
      </div>
    </div>

    <div class="volume-control">
      🔊 <input type="range" id="volumeSlider" min="0" max="100" value="50" />
      <span id="volumeLabel">50%</span>
    </div>

    <div class="answer-list">
      <div id="summaryBox">
        <div id="userCount">Tap人数: 0人</div>
        <div id="judgeCounts">〇:0、×:0、計:0</div>
      </div>
      <div id="userNames" class="user-names"></div>
    </div>
    
    </div>
  </div>

  <audio id="boo" src="assets/boo.mp3"></audio>
  <audio id="seikai" src="assets/seikai.mp3"></audio>
  <audio id="button" src="assets/button.mp3"></audio>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
